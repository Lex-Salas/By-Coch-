<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BY COCHÉ — Panel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B1B;
    --bone:#F3ECE2;
    --clay:#C97B5F;
    --sage:#8A9A82;
    --gold:#C9A66B;
    --line: rgba(27,27,27,0.12);
    --danger:#B5483D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bone);
    color:var(--ink);
    font-family:'Inter',sans-serif;
  }
  a{color:inherit;}

  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .login-box{
    background:#fff;
    border:1px solid var(--line);
    padding:48px 40px;
    width:100%;
    max-width:380px;
    text-align:center;
  }
  .login-box .logo{
    font-family:'Fraunces',serif;
    font-size:28px;
    margin-bottom:6px;
  }
  .login-box .logo em{color:var(--clay); font-style:italic; font-weight:400;}
  .login-box p{font-size:13px; opacity:0.6; margin-bottom:28px;}
  .login-box input{
    width:100%;
    padding:13px 14px;
    border:1px solid var(--line);
    font-size:14px;
    margin-bottom:14px;
    font-family:'Inter',sans-serif;
  }
  .login-box button{
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--bone);
    border:none;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .2s;
  }
  .login-box button:hover{background:var(--clay);}
  .login-error{color:var(--danger); font-size:12px; margin-top:10px; min-height:16px;}

  /* ---------- ADMIN APP ---------- */
  #admin-app{display:none;}
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 5vw;
    border-bottom:1px solid var(--line);
    background:#fff;
  }
  header .logo{font-family:'Fraunces',serif; font-size:22px;}
  header .logo em{color:var(--clay); font-style:italic; font-weight:400;}
  header .actions{display:flex; gap:12px; align-items:center;}
  .btn{
    padding:10px 18px;
    font-size:12px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    border:1px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    transition:.2s;
    border-radius:2px;
  }
  .btn:hover{background:var(--ink); color:var(--bone);}
  .btn-primary{background:var(--ink); color:var(--bone);}
  .btn-primary:hover{background:var(--clay); border-color:var(--clay);}
  .btn-danger{border-color:var(--danger); color:var(--danger);}
  .btn-danger:hover{background:var(--danger); color:#fff;}

  main{padding:36px 5vw 80px;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:12px;
  }
  .toolbar h1{font-family:'Fraunces',serif; font-weight:500; font-size:26px; margin:0;}
  .toolbar .status{font-size:12px; opacity:0.55;}

  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border:1px solid var(--line);
  }
  th, td{
    padding:14px 16px;
    text-align:left;
    font-size:13px;
    border-bottom:1px solid var(--line);
  }
  th{
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-size:11px;
    opacity:0.55;
    background:#FBF8F4;
  }
  td.actions-cell{display:flex; gap:8px;}
  .mini-btn{
    font-size:11px;
    padding:6px 10px;
    border:1px solid var(--line);
    background:transparent;
    cursor:pointer;
    border-radius:2px;
    transition:.2s;
  }
  .mini-btn:hover{background:var(--ink); color:var(--bone); border-color:var(--ink);}
  .mini-btn.danger:hover{background:var(--danger); border-color:var(--danger);}
  .thumb{
    width:42px; height:42px;
    object-fit:cover;
    background:var(--sage);
    border-radius:2px;
  }
  .cat-tag{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:3px 8px;
    border-radius:2px;
    background:var(--bone);
    border:1px solid var(--line);
  }
  .empty-row td{text-align:center; opacity:0.5; padding:40px;}

  /* ---------- MODAL ---------- */
  .modal-overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(27,27,27,0.5);
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:#fff;
    width:100%;
    max-width:460px;
    padding:32px;
  }
  .modal h2{font-family:'Fraunces',serif; font-weight:500; font-size:22px; margin:0 0 22px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    opacity:0.6;
    margin-bottom:6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .field textarea{resize:vertical; min-height:60px;}
  .modal-actions{display:flex; gap:10px; margin-top:24px;}
  .modal-actions .btn{flex:1; text-align:center;}
  .modal-msg{font-size:12px; margin-top:10px; min-height:16px;}
  .modal-msg.error{color:var(--danger);}
  .modal-msg.ok{color:var(--sage);}

  @media (max-width:720px){
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tr{border:1px solid var(--line); margin-bottom:12px; background:#fff;}
    td{border:none; display:flex; justify-content:space-between; gap:10px;}
    td::before{content:attr(data-label); font-size:10px; text-transform:uppercase; opacity:0.5;}
    td.actions-cell{justify-content:flex-end;}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">BY <em>COCHÉ</em></div>
    <p>Panel administrativo</p>
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="off">
    <button onclick="tryLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ============ ADMIN APP ============ -->
<div id="admin-app">
  <header>
    <div class="logo">BY <em>COCHÉ</em> · Admin</div>
    <div class="actions">
      <span class="toolbar status" id="api-status"></span>
      <button class="btn" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <h1>Productos</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Nuevo producto</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Img</th>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="product-rows">
        <tr class="empty-row"><td colspan="6">Cargando productos…</td></tr>
      </tbody>
    </table>
  </main>
</div>

<!-- ============ MODAL PRODUCTO ============ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Nuevo producto</h2>
    <input type="hidden" id="product-id">

    <div class="field">
      <label>Nombre</label>
      <input type="text" id="f-nombre" placeholder="Camisa Columbia Azul">
    </div>

    <div class="field">
      <label>Precio (₡)</label>
      <input type="number" id="f-precio" placeholder="12000">
    </div>

    <div class="field">
      <label>Categoría</label>
      <select id="f-categoria">
        <option value="moda">Moda</option>
        <option value="anime">Colección Japón</option>
        <option value="hogar">Hogar</option>
      </select>
    </div>

    <div class="field">
      <label>Imagen (URL o ruta, ej: images/camisa.jpg)</label>
      <input type="text" id="f-imagen" placeholder="images/camisa-azul.jpg">
    </div>

    <div class="field">
      <label>Stock disponible</label>
      <input type="number" id="f-stock" placeholder="5">
    </div>

    <div class="field">
      <label>Descripción (opcional)</label>
      <textarea id="f-descripcion" placeholder="Detalles del producto..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<script>
  // 👉 Si el backend cambia de dominio/puerto, actualiza esta línea:
  const API_URL = "https://older-mold-ones-vhs.trycloudflare.com/api/products";
  const ADMIN_PASSWORD = "admin123456";

  let productsCache = [];

  // ---------- LOGIN ----------
  function tryLogin(){
    const pass = document.getElementById('login-password').value;
    if(pass === ADMIN_PASSWORD){
      sessionStorage.setItem('byCocheAdminAuth', 'ok');
      showAdmin();
    } else {
      document.getElementById('login-error').textContent = 'Contraseña incorrecta';
    }
  }

  document.getElementById('login-password').addEventListener('keydown', e => {
    if(e.key === 'Enter') tryLogin();
  });

  function logout(){
    sessionStorage.removeItem('byCocheAdminAuth');
    document.getElementById('admin-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-password').value = '';
  }

  function showAdmin(){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-app').style.display = 'block';
    loadProducts();
  }

  if(sessionStorage.getItem('byCocheAdminAuth') === 'ok'){
    showAdmin();
  }

  // ---------- CARGAR PRODUCTOS ----------
  const categoryLabels = { moda: 'Moda', anime: 'Colección Japón', hogar: 'Hogar' };

  function formatPriceCRC(n){
    return '₡' + Number(n || 0).toLocaleString('es-CR');
  }

  async function loadProducts(){
    const statusEl = document.getElementById('api-status');
    const rowsEl = document.getElementById('product-rows');
    statusEl.textContent = 'Cargando...';
    try{
      const res = await fetch(API_URL);
      if(!res.ok) throw new Error('Respuesta no válida');
      productsCache = await res.json();
      renderRows();
      statusEl.textContent = `${productsCache.length} producto${productsCache.length !== 1 ? 's' : ''} · conectado`;
    }catch(err){
      console.error(err);
      rowsEl.innerHTML = `<tr class="empty-row"><td colspan="6">No se pudo conectar con el backend. Revisa que la API esté activa.</td></tr>`;
      statusEl.textContent = 'Sin conexión';
    }
  }

  function renderRows(){
    const rowsEl = document.getElementById('product-rows');
    if(!productsCache.length){
      rowsEl.innerHTML = `<tr class="empty-row"><td colspan="6">Aún no hay productos. Crea el primero con "+ Nuevo producto".</td></tr>`;
      return;
    }
    rowsEl.innerHTML = productsCache.map(p => `
      <tr>
        <td data-label="Img"><img class="thumb" src="${p.imagen || ''}" onerror="this.style.opacity=0"></td>
        <td data-label="Nombre">${p.nombre || ''}</td>
        <td data-label="Categoría"><span class="cat-tag">${categoryLabels[p.categoria] || 'Moda'}</span></td>
        <td data-label="Precio">${formatPriceCRC(p.precio)}</td>
        <td data-label="Stock">${p.stock !== undefined ? p.stock : '—'}</td>
        <td data-label="Acciones" class="actions-cell">
          <button class="mini-btn" onclick="editProduct('${p.id}')">Editar</button>
          <button class="mini-btn danger" onclick="deleteProduct('${p.id}')">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  // ---------- MODAL ----------
  function openModal(){
    document.getElementById('modal-title').textContent = 'Nuevo producto';
    document.getElementById('product-id').value = '';
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-precio').value = '';
    document.getElementById('f-categoria').value = 'moda';
    document.getElementById('f-imagen').value = '';
    document.getElementById('f-stock').value = '';
    document.getElementById('f-descripcion').value = '';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(){
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function editProduct(id){
    const p = productsCache.find(x => x.id === id);
    if(!p) return;
    document.getElementById('modal-title').textContent = 'Editar producto';
    document.getElementById('product-id').value = p.id;
    document.getElementById('f-nombre').value = p.nombre || '';
    document.getElementById('f-precio').value = p.precio || '';
    document.getElementById('f-categoria').value = p.categoria || 'moda';
    document.getElementById('f-imagen').value = p.imagen || '';
    document.getElementById('f-stock').value = p.stock !== undefined ? p.stock : '';
    document.getElementById('f-descripcion').value = p.descripcion || '';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  async function saveProduct(){
    const id = document.getElementById('product-id').value;
    const nombre = document.getElementById('f-nombre').value.trim();
    const precio = Number(document.getElementById('f-precio').value);
    const categoria = document.getElementById('f-categoria').value;
    const imagen = document.getElementById('f-imagen').value.trim();
    const stockVal = document.getElementById('f-stock').value;
    const descripcion = document.getElementById('f-descripcion').value.trim();
    const msgEl = document.getElementById('modal-msg');

    if(!nombre || !precio){
      msgEl.textContent = 'Nombre y precio son obligatorios';
      msgEl.className = 'modal-msg error';
      return;
    }

    const payload = { nombre, precio, categoria, imagen, descripcion };
    if(stockVal !== '') payload.stock = Number(stockVal);

    try{
      msgEl.textContent = 'Guardando...';
      msgEl.className = 'modal-msg';

      const url = id ? `${API_URL}/${id}` : API_URL;
      const method = id ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if(!res.ok) throw new Error('Error al guardar');

      msgEl.textContent = 'Guardado ✓';
      msgEl.className = 'modal-msg ok';
      await loadProducts();
      setTimeout(closeModal, 500);

    }catch(err){
      console.error(err);
      msgEl.textContent = 'No se pudo guardar. Revisa la conexión con el backend.';
      msgEl.className = 'modal-msg error';
    }
  }

  async function deleteProduct(id){
    if(!confirm('¿Eliminar este producto? Esta acción no se puede deshacer.')) return;
    try{
      const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      if(!res.ok) throw new Error('Error al eliminar');
      await loadProducts();
    }catch(err){
      console.error(err);
      alert('No se pudo eliminar el producto. Revisa la conexión con el backend.');
    }
  }
</script>

</body>
</html>
