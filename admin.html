<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BY COCHÉ — Panel de Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #10b981;
    --danger: #ef4444;
    --border: rgba(255, 255, 255, 0.08);
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- PANTALLA DE LOGIN ---------- */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
  }

  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    text-align: center;
  }

  .login-card h1 {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px 0;
    letter-spacing: -0.5px;
  }

  .login-card p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 32px 0;
  }

  /* ---------- LAYOUT PRINCIPAL ---------- */
  #admin-panel {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header-actions h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.5px;
  }

  /* ---------- COMPONENTES DE CONTROL ---------- */
  .btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background-color: var(--accent-hover);
  }

  .btn-secondary {
    background-color: transparent;
    color: var(--text-main);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background-color: rgba(255, 255, 255, 0.05);
  }

  .btn-danger {
    background-color: rgba(239, 68, 68, 0.15);
    color: #f87171;
  }

  .btn-danger:hover {
    background-color: var(--danger);
    color: #fff;
  }

  /* ---------- FORMULARIOS E INPUTS ---------- */
  .form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select, textarea {
    font-family: inherit;
    background-color: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  /* ---------- TABLA DE PRODUCTOS ---------- */
  .table-container {
    background-color: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 14px;
  }

  th {
    background-color: rgba(0, 0, 0, 0.2);
    color: var(--text-muted);
    font-weight: 600;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  td {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background-color: rgba(255, 255, 255, 0.02);
  }

  .img-preview {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 6px;
    background-color: var(--bg-input);
    border: 1px solid var(--border);
  }

  .badge {
    display: inline-flex;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    text-transform: capitalize;
    background-color: rgba(255, 255, 255, 0.08);
  }

  .action-buttons {
    display: flex;
    gap: 8px;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    padding: 20px;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background-color: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 550px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    position: relative;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-header h3 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 32px;
  }

  .modal-msg {
    font-size: 13px;
    font-weight: 500;
    margin-top: 12px;
  }
  .modal-msg.error { color: var(--danger); }
  .modal-msg.ok { color: var(--success); }

  .loading-msg {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-weight: 500;
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>BY COCHÉ</h1>
    <p>Panel de Control Privado</p>
    <div class="form-group" style="text-align: left;">
      <label for="pass-input">Contraseña de acceso</label>
      <input type="password" id="pass-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') verifyLogin()">
    </div>
    <button class="btn btn-primary" onclick="verifyLogin()" style="width: 100%; justify-content: center; margin-top: 12px;">
      Ingresar al Sistema
    </button>
    <div id="login-err" class="modal-msg error" style="margin-top: 16px;"></div>
  </div>
</div>

<div id="admin-panel" style="display:none;">
  <div class="header-actions">
    <div>
      <h2>Gestión de Inventario</h2>
      <p style="color: var(--text-muted); margin: 4px 0 0 0; font-size: 14px;">Administra los artículos de tu catálogo en tiempo real.</p>
    </div>
    <button class="btn btn-primary" onclick="openCreateModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Agregar Producto
    </button>
  </div>

  <div class="table-container">
    <table id="products-table">
      <thead>
        <tr>
          <th style="width: 80px;">Imagen</th>
          <th>Artículo</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th style="width: 100px;">Stock</th>
          <th style="width: 160px; text-align: right;">Acciones</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
    <div id="loading-placeholder" class="loading-msg">Cargando productos de la base de datos...</div>
  </div>
</div>

<div class="modal-overlay" id="product-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">Editar Producto</h3>
      <button class="btn btn-secondary" onclick="closeModal()" style="padding: 6px 10px;">✕</button>
    </div>
    
    <input type="hidden" id="prod-id">
    
    <div class="form-group">
      <label for="prod-nombre">Nombre del Producto *</label>
      <input type="text" id="prod-nombre" placeholder="Ej. Sábanas de Algodón Premium">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
      <div class="form-group">
        <label for="prod-precio">Precio (₡) *</label>
        <input type="number" id="prod-precio" placeholder="0">
      </div>
      <div class="form-group">
        <label for="prod-stock">Unidades en Stock</label>
        <input type="number" id="prod-stock" placeholder="0">
      </div>
    </div>

    <div class="form-group">
      <label for="prod-categoria">Categoría del Artículo</label>
      <select id="prod-categoria">
        <option value="ropa-cama">Ropa de Cama</option>
        <option value="casual">Ropa Casual</option>
        <option value="deportiva">Ropa Deportiva</option>
        <option value="otros">Otros Textiles</option>
      </select>
    </div>

    <div class="form-group">
      <label for="prod-imagen">URL de la Imagen (Enlace Directo ImgBB)</label>
      <input type="text" id="prod-imagen" placeholder="https://i.ibb.co/.../imagen.jpg">
    </div>

    <div class="form-group">
      <label for="prod-descripcion">Descripción del Artículo</label>
      <textarea id="prod-descripcion" rows="3" placeholder="Detalles, tallas, materiales disponibles..."></textarea>
    </div>

    <div id="modal-msg" class="modal-msg"></div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProduct()">Guardar Cambios</button>
    </div>
  </div>
</div>

<script>
  // Cambiar esta URL por la de tu túnel activo de Cloudflare cuando se reinicie
  const API_URL = "https://lex-salas.github.io/By-Coch-/api/products"; 

  function verifyLogin(){
    const pass = document.getElementById('pass-input').value;
    // Autenticación correcta con la clave solicitada
    if(pass === "admin123456"){ 
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadProducts();
    } else {
      document.getElementById('login-err').textContent = "Contraseña incorrecta. Inténtalo de nuevo.";
    }
  }

  async function loadProducts(){
    const tbody = document.getElementById('table-body');
    const placeholder = document.getElementById('loading-placeholder');
    try {
      const res = await fetch(API_URL);
      if(!res.ok) throw new Error('No se pudo mapear la respuesta');
      const products = await res.json();
      
      tbody.innerHTML = '';
      placeholder.style.display = 'none';

      if(products.length === 0){
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding:32px;">No hay productos registrados en el inventario.</td></tr>`;
        return;
      }

      products.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><img src="${p.imagen || 'https://via.placeholder.com/150'}" class="img-preview" alt=""></td>
          <td style="font-weight:600;">${p.nombre}</td>
          <td><span class="badge">${p.categoria || 'Textil'}</span></td>
          <td style="font-weight:600; color:var(--success)">₡${Number(p.precio).toLocaleString()}</td>
          <td><span style="font-weight:500; color: ${p.stock > 0 ? 'var(--text-main)' : 'var(--danger)'}">${p.stock ?? 0} uds</span></td>
          <td style="text-align: right;">
            <div class="action-buttons" style="justify-content: flex-end;">
              <button class="btn btn-secondary" style="padding: 6px 12px; font-size:12px;" onclick="openEditModal('${p.id}', '${escapeHtml(p.nombre)}', ${p.precio}, '${p.categoria || ''}', '${p.imagen || ''}', '${escapeHtml(p.descripcion || '')}', ${p.stock ?? ''})">Editar</button>
              <button class="btn btn-danger" style="padding: 6px 12px; font-size:12px;" onclick="deleteProduct('${p.id}')">Eliminar</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch(err) {
      console.error(err);
      placeholder.textContent = 'Error al conectar con el servidor backend. Revisa el túnel de Cloudflare.';
      placeholder.className = 'loading-msg error';
    }
  }

  function openCreateModal(){
    document.getElementById('modal-title').textContent = 'Agregar Nuevo Artículo';
    document.getElementById('prod-id').value = '';
    document.getElementById('prod-nombre').value = '';
    document.getElementById('prod-precio').value = '';
    document.getElementById('prod-stock').value = '';
    document.getElementById('prod-categoria').value = 'ropa-cama';
    document.getElementById('prod-imagen').value = '';
    document.getElementById('prod-descripcion').value = '';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('product-modal').classList.add('active');
  }

  function openEditModal(id, nombre, precio, categoria, imagen, descripcion, stock){
    document.getElementById('modal-title').textContent = 'Modificar Artículo';
    document.getElementById('prod-id').value = id;
    document.getElementById('prod-nombre').value = nombre;
    document.getElementById('prod-precio').value = precio;
    document.getElementById('prod-stock').value = stock !== 'undefined' ? stock : '';
    document.getElementById('prod-categoria').value = categoria || 'ropa-cama';
    document.getElementById('prod-imagen').value = imagen;
    document.getElementById('prod-descripcion').value = descripcion !== 'undefined' ? descripcion : '';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('product-modal').classList.add('active');
  }

  function closeModal(){
    document.getElementById('product-modal').classList.remove('active');
  }

  async function saveProduct(){
    const id = document.getElementById('prod-id').value;
    const nombre = document.getElementById('prod-nombre').value.trim();
    const precio = document.getElementById('prod-precio').value;
    const stockVal = document.getElementById('prod-stock').value;
    const categoria = document.getElementById('prod-categoria').value;
    const imagen = document.getElementById('prod-imagen').value.trim();
    const descripcion = document.getElementById('prod-descripcion').value.trim();
    const msgEl = document.getElementById('modal-msg');

    if(!nombre || !precio){
      msgEl.textContent = 'El nombre y el precio son obligatorios';
      msgEl.className = 'modal-msg error';
      return;
    }

    const payload = { nombre, precio: Number(precio), categoria, imagen, descripcion };
    if(stockVal !== '') payload.stock = Number(stockVal);

    try {
      msgEl.textContent = 'Guardando en la base de datos...';
      msgEl.className = 'modal-msg';

      const url = id ? `${API_URL}/${id}` : API_URL;
      const method = id ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if(!res.ok) throw new Error('Error en el guardado HTTP');

      msgEl.textContent = '¡Cambios guardados con éxito! ✓';
      msgEl.className = 'modal-msg ok';
      await loadProducts();
      setTimeout(closeModal, 600);
    } catch(err) {
      console.error(err);
      msgEl.textContent = 'Error crítico al procesar. Verifica el estado de la API.';
      msgEl.className = 'modal-msg error';
    }
  }

  async function deleteProduct(id){
    if(!confirm('¿Estás seguro de que deseas eliminar permanentemente este artículo?')) return;
    try {
      const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      if(!res.ok) throw new Error('Error al remover el nodo');
      await loadProducts();
    } catch(err) {
      console.error(err);
      alert('Imposible eliminar el artículo. Confirma la conexión con tu VPS.');
    }
  }

  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }
</script>
</body>
</html>
